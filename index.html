<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XZU4 System Position</title>
<style>
    body { background:#111; color:#eee; font-family: monospace; padding:20px; }
    .block { margin-bottom:20px; padding:10px; border:1px solid #444; }
    input, textarea { width:100%; background:#222; color:#eee; border:1px solid #555; padding:8px; }
</style>
</head>
<body>

<h2>XZU4 — System Position Viewer</h2>

<div class="block">
    <h3>Input</h3>
    <input id="pos12" placeholder="pos12 (0–11)">
    <input id="pos4" placeholder="pos4 (0–3)" style="margin-top:5px;">
    <input id="vpos" placeholder="vpos (0–3)" style="margin-top:5px;">
</div>

<div class="block">
    <h3>Output</h3>
    <textarea id="out" rows="10" readonly></textarea>
</div>

<script>
function update() {
    const p12 = parseInt(document.getElementById("pos12").value);
    const p4  = parseInt(document.getElementById("pos4").value);
    const vp  = parseInt(document.getElementById("vpos").value);

    if (isNaN(p12) || isNaN(p4) || isNaN(vp)) {
        document.getElementById("out").value = "invalid";
        return;
    }

    const next12 = (p12 + 1) % 12;
    const prev12 = (p12 + 11) % 12;

    const next4 = (p4 + 1) % 4;
    const prev4 = (p4 + 3) % 4;

    const nextV = (vp + 1) % 4;
    const prevV = (vp + 3) % 4;

    document.getElementById("out").value =
`pos12=${p12}
next12=${next12}
prev12=${prev12}

pos4=${p4}
next4=${next4}
prev4=${prev4}

vpos=${vp}
nextV=${nextV}
prevV=${prevV}`;
}

document.getElementById("pos12").addEventListener("input", update);
document.getElementById("pos4").addEventListener("input", update);
document.getElementById("vpos").addEventListener("input", update);
</script>

</body>
</html>
